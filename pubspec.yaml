name: qianjirepro
description: QianJi - A beautiful personal finance tracker.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  sqflite: ^2.4.2
  shared_preferences: ^2.3.5
  path: ^1.9.1
  path_provider: ^2.1.5
  uuid: ^4.5.1
  fl_chart: ^0.70.2
  flutter_local_notifications: ^18.0.1
  csv: ^6.0.0
  share_plus: ^10.1.4
  excel: ^4.0.6
  intl: ^0.20.2
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  http: ^1.3.0
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.14.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/images/
